<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <h1 id="title">Calculator</h1>
    <div id="container">
      <div id="visor">1234567890</div>
      <div id="buttons-area">
        <div class="button-line">
          <button type="button" id="number-7" class="number">7</button>
          <button type="button" id="number-8" class="number">8</button>
          <button type="button" id="number-9" class="number">9</button>
          <button type="button" id="add" class="operation">+</button>
        </div>
        <div class="button-line">
          <button type="button" id="number-4" class="number">4</button>
          <button type="button" id="number-5" class="number">5</button>
          <button type="button" id="number-6" class="number">6</button>
          <button type="button" id="subtract" class="operation">-</button>
        </div>
        <div class="button-line">
          <button type="button" id="number-1" class="number">1</button>
          <button type="button" id="number-2" class="number">2</button>
          <button type="button" id="number-3" class="number">3</button>
          <button type="button" id="multiply" class="operation">*</button>
        </div>
        <div class="button-line">
          <button type="button" id="number-." class="number">.</button>
          <button type="button" id="number-0" class="number">0</button>
          <button type="button" id="equals">=</button>
          <button type="button" id="divide" class="operation">/</button>
        </div>
      </div>
    </div>
  </body>
</html>
